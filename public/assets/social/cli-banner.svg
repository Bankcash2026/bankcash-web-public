<svg width="1200" height="540" viewBox="0 0 1200 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">BankCash CLI terminal preview</title>
  <desc id="desc">A branded terminal showing read-only BankCash status and official link commands.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#030814"/>
      <stop offset=".58" stop-color="#071a38"/>
      <stop offset="1" stop-color="#062968"/>
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#081325"/>
      <stop offset="1" stop-color="#040a16"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#62b0ff"/>
      <stop offset=".55" stop-color="#1f73ff"/>
      <stop offset="1" stop-color="#0052ff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>
  <rect width="1200" height="540" rx="28" fill="url(#background)"/>
  <circle cx="1030" cy="120" r="190" fill="#2074ff" opacity=".18" filter="url(#glow)"/>
  <circle cx="1040" cy="405" r="140" fill="#2a84ff" opacity=".15" filter="url(#glow)"/>

  <rect x="42" y="40" width="760" height="460" rx="20" fill="url(#terminal)" stroke="#183358" stroke-width="2"/>
  <path d="M42 96h760" stroke="#183358" stroke-width="2"/>
  <circle cx="72" cy="69" r="8" fill="#ff5f57"/>
  <circle cx="98" cy="69" r="8" fill="#febc2e"/>
  <circle cx="124" cy="69" r="8" fill="#28c840"/>
  <text x="166" y="76" fill="#8aa4c6" font-size="16" font-family="Consolas, 'Courier New', monospace">bankcash-cli - public readonly console</text>

  <text x="70" y="143" fill="#4aa1ff" font-size="19" font-family="Consolas, 'Courier New', monospace">$</text>
  <text x="96" y="143" fill="#ecf5ff" font-size="19" font-family="Consolas, 'Courier New', monospace">bankcash status</text>
  <text x="70" y="188" fill="#87a4c5" font-size="18" font-family="Consolas, 'Courier New', monospace">website</text>
  <text x="210" y="188" fill="#42d392" font-size="18" font-family="Consolas, 'Courier New', monospace">UP (200)</text>
  <text x="332" y="188" fill="#87a4c5" font-size="18" font-family="Consolas, 'Courier New', monospace">https://bcash.fun/</text>
  <text x="70" y="224" fill="#87a4c5" font-size="18" font-family="Consolas, 'Courier New', monospace">github</text>
  <text x="210" y="224" fill="#42d392" font-size="18" font-family="Consolas, 'Courier New', monospace">UP (200)</text>
  <text x="332" y="224" fill="#87a4c5" font-size="18" font-family="Consolas, 'Courier New', monospace">github.com/Bankcash2026</text>
  <text x="70" y="268" fill="#42d392" font-size="18" font-family="Consolas, 'Courier New', monospace">Overall: HEALTHY</text>

  <text x="70" y="328" fill="#4aa1ff" font-size="19" font-family="Consolas, 'Courier New', monospace">$</text>
  <text x="96" y="328" fill="#ecf5ff" font-size="19" font-family="Consolas, 'Courier New', monospace">bankcash links --json</text>
  <text x="70" y="372" fill="#87a4c5" font-size="15" font-family="Consolas, 'Courier New', monospace">{ "website": "https://bcash.fun/",</text>
  <text x="70" y="404" fill="#87a4c5" font-size="15" font-family="Consolas, 'Courier New', monospace">  "x": "https://x.com/bankcash_",</text>
  <text x="70" y="436" fill="#87a4c5" font-size="15" font-family="Consolas, 'Courier New', monospace">  "github": "https://github.com/Bankcash2026/bankcash-web-public" }</text>
  <rect x="70" y="462" width="12" height="22" fill="#4aa1ff" opacity=".92"/>

  <g transform="translate(860 94)">
    <circle cx="122" cy="94" r="88" fill="#081a3c" stroke="#24579b" stroke-width="2"/>
    <circle cx="122" cy="94" r="74" fill="none" stroke="url(#brand)" stroke-width="12"/>
    <path d="M91 48v112M91 67h31c30 0 44 14 44 30 0 12-6 21-19 26 16 5 23 16 23 28 0 20-16 32-48 32H91M64 84h66M64 106h66M64 128h40" fill="none" stroke="url(#brand)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="862" y="326" fill="#f4f8ff" font-size="36" font-weight="700" font-family="Arial, sans-serif">BankCash CLI</text>
  <text x="862" y="364" fill="#6caaff" font-size="17" letter-spacing="3" font-family="Consolas, 'Courier New', monospace">READ-ONLY PUBLIC TOOL</text>
  <path d="M862 394h244" stroke="#183f78" stroke-width="2"/>
  <text x="862" y="433" fill="#a8bed9" font-size="17" font-family="Consolas, 'Courier New', monospace">status / links / routes</text>
  <text x="862" y="466" fill="#a8bed9" font-size="17" font-family="Consolas, 'Courier New', monospace">config / check / open</text>
</svg>
